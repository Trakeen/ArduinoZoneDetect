name=ArduinoZoneDetect
version=1.0.0
author=ArduinoZoneDetect contributors
maintainer=ArduinoZoneDetect contributors
sentence=Timezone detection from GPS coordinates using ZoneDetect binary files.
paragraph=Given latitude/longitude in degrees, looks up the IANA timezone ID from a timezone21.bin or timezone16.bin file on SD card. Optionally computes the UTC offset including DST (summer/winter time) using a companion dst_rules.bin file.
category=Timing
url=https://github.com/yourusername/ArduinoZoneDetect
architectures=*
includes=ZoneDetect.h,DST.h
